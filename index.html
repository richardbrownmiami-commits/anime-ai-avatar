<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hana AI - Anime Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#080612;color:#e0d4ff;font-family:'Segoe UI',sans-serif;height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;}
h1{font-size:16px;color:#b57bff;letter-spacing:4px;text-shadow:0 0 18px #8b3fe8,0 0 40px #5a1fa0;margin-bottom:2px;}
#avatarWrap{position:relative;width:340px;height:340px;flex-shrink:0;}
canvas{width:340px;height:340px;display:block;}
#speechBubble{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#120d22;border:1px solid #3d1a6e;border-radius:16px;padding:8px 14px;max-width:270px;min-width:120px;font-size:12.5px;color:#ddd0ff;text-align:center;opacity:0;transition:opacity 0.4s;pointer-events:none;box-shadow:0 0 18px rgba(139,63,232,0.3);}
#speechBubble.show{opacity:1;}
#chatBox{width:340px;height:110px;overflow-y:auto;background:#0c0818;border:1px solid #1e0f36;border-radius:14px;padding:8px 10px;margin:4px 0;scroll-behavior:smooth;}
#chatBox::-webkit-scrollbar{width:4px;}
#chatBox::-webkit-scrollbar-track{background:#0c0818;}
#chatBox::-webkit-scrollbar-thumb{background:#3d1a6e;border-radius:4px;}
.msg{padding:5px 10px;margin:3px 0;border-radius:10px;font-size:12.5px;line-height:1.5;}
.user{background:#12082a;border:1px solid #2a1050;text-align:right;color:#c4a0ff;}
.ai{background:#0e0620;border:1px solid #1e0f36;color:#e8d8ff;}
.ai span{color:#b57bff;font-weight:bold;}
#inputRow{display:flex;gap:7px;width:340px;padding:0 0 6px;}
#msgInput{flex:1;padding:9px 14px;border-radius:22px;border:1px solid #2a1050;background:#0c0818;color:#e0d4ff;font-size:13px;outline:none;}
#msgInput::placeholder{color:#4a3568;}
#msgInput:focus{border-color:#6b3fa0;box-shadow:0 0 10px rgba(107,63,160,0.3);}
#sendBtn{padding:9px 16px;border-radius:22px;border:none;background:linear-gradient(135deg,#6b3fa0,#a020d0);color:#fff;font-weight:bold;cursor:pointer;font-size:13px;box-shadow:0 0 12px rgba(107,63,160,0.4);}
#sendBtn:active{opacity:0.75;}
#micBtn{padding:9px 13px;border-radius:50%;border:1px solid #2a1050;background:#0c0818;color:#b57bff;cursor:pointer;font-size:15px;}
#micBtn:active{background:#1a0a30;}
</style>
</head>
<body>
<h1>✦ HANA AI ✦</h1>
<div id="avatarWrap">
  <canvas id="c" width="340" height="340"></canvas>
  <div id="speechBubble"></div>
</div>
<div id="chatBox"></div>
<div id="inputRow">
  <button id="micBtn" title="Voice input">🎤</button>
  <input id="msgInput" type="text" placeholder="Talk to Hana..."/>
  <button id="sendBtn">Send</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=340,H=340,CX=170;
let t=0,blinkT=rand(120,200),blinkP=0,blinking=false;
let mouthOpen=0,talking=false,talkPhase=0;
let bodyBob=0,hairSway=0,eyeX=0,eyeY_=0,emotion='happy';
function rand(a,b){return a+Math.random()*(b-a);}
const C={
  skin:'#FDDBB4',skinS:'#F0C090',skinD:'#E8A870',
  hair:'#2d0f52',hairH:'#6b3fa0',
  eye:'#8B3FE8',eyeL:'#C490FF',
  lip:'#E05070',lipD:'#901030',
  shirt:'#1a1a2e',bow:'#cc3380',
  jacket:'#1a1040',jacketH:'#2d1a60',
  outline:'#1a0832',
};
function drawBody(cy){
  ctx.fillStyle=C.jacket;
  ctx.beginPath();
  ctx.moveTo(CX-85,cy);
  ctx.bezierCurveTo(CX-100,cy+55,CX-80,cy+115,CX-65,cy+140);
  ctx.lineTo(CX+65,cy+140);
  ctx.bezierCurveTo(CX+80,cy+115,CX+100,cy+55,CX+85,cy);
  ctx.bezierCurveTo(CX+50,cy-18,CX-50,cy-18,CX-85,cy);
  ctx.fill();
  ctx.fillStyle=C.jacketH;
  ctx.beginPath();
  ctx.moveTo(CX-78,cy+5);
  ctx.bezierCurveTo(CX-88,cy+55,CX-70,cy+110,CX-55,cy+135);
  ctx.lineTo(CX+55,cy+135);
  ctx.bezierCurveTo(CX+70,cy+110,CX+88,cy+55,CX+78,cy+5);
  ctx.bezierCurveTo(CX+44,cy-12,CX-44,cy-12,CX-78,cy+5);
  ctx.fill();
  // Shirt collar
  ctx.fillStyle=C.shirt;
  ctx.beginPath();
  ctx.moveTo(CX-20,cy-3);ctx.lineTo(CX-8,cy+50);ctx.lineTo(CX,cy+32);
  ctx.lineTo(CX+8,cy+50);ctx.lineTo(CX+20,cy-3);ctx.closePath();ctx.fill();
  // Bow
  ctx.fillStyle=C.bow;
  [[CX-14,cy+16,-1],[CX+14,cy+16,1]].forEach(([bx,by,s])=>{
    ctx.beginPath();
    ctx.moveTo(bx,by-7);ctx.quadraticCurveTo(bx+s*5,by,CX,cy+18);
    ctx.quadraticCurveTo(bx+s*5,by+7,bx,by+7);ctx.closePath();ctx.fill();
  });
  ctx.fillStyle='#ff1a6e';
  ctx.beginPath();ctx.arc(CX,cy+18,4.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,150,200,0.4)';
  ctx.beginPath();ctx.arc(CX,cy+17,2,0,Math.PI*2);ctx.fill();
}
function drawNeck(headY){
  ctx.fillStyle=C.skin;
  ctx.beginPath();ctx.ellipse(CX,headY+78,15,20,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.skinS;
  ctx.beginPath();ctx.ellipse(CX+3,headY+83,4,10,0.2,0,Math.PI*2);ctx.fill();
}
function drawBackHair(headY){
  const sw=Math.sin(hairSway)*6;
  ctx.fillStyle=C.hair;
  ctx.beginPath();ctx.ellipse(CX+sw*0.2,headY+15,88,108,0,0,Math.PI*2);ctx.fill();
  [[-1,1],[1,-1]].forEach(([d1,d2])=>{
    ctx.beginPath();
    ctx.moveTo(CX+d1*78,headY-18);
    ctx.bezierCurveTo(CX+d1*(108+sw*d2),headY+75,CX+d1*(93+sw*d2),headY+170,CX+d1*(73+sw*d2),headY+195);
    ctx.bezierCurveTo(CX+d1*(53+sw*d2),headY+195,CX+d1*(43+sw*d2),headY+180,CX+d1*(48+sw*d2),headY+165);
    ctx.bezierCurveTo(CX+d1*68,headY+90,CX+d1*53,headY+25,CX+d1*46,headY-4);
    ctx.closePath();ctx.fill();
  });
}
function drawHead(headY){
  ctx.fillStyle=C.skin;
  ctx.beginPath();ctx.ellipse(CX,headY,68,78,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.skinS;
  ctx.beginPath();ctx.ellipse(CX,headY+56,30,20,0,0,Math.PI);ctx.fill();
  ctx.fillStyle=C.skin;
  ctx.beginPath();ctx.ellipse(CX,headY+50,24,16,0,0,Math.PI);ctx.fill();
  // Blush - darker for dark mode look
  ctx.fillStyle='rgba(200,80,100,0.28)';
  ctx.beginPath();ctx.ellipse(CX-46,headY+20,19,10,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(CX+46,headY+20,19,10,0.2,0,Math.PI*2);ctx.fill();
}
function drawEars(headY){
  [[-70,0.3],[70,-0.3]].forEach(([ox,ang])=>{
    ctx.fillStyle=C.skin;
    ctx.beginPath();ctx.ellipse(CX+ox,headY+7,8,12,ang,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=C.skinD;
    ctx.beginPath();ctx.ellipse(CX+ox+(ox>0?1:-1),headY+8,3.5,6.5,ang,0,Math.PI*2);ctx.fill();
  });
}
function drawEyes(headY){
  const bp=blinking?Math.max(0.04,1-blinkP):1;
  [-25,25].forEach((ox)=>{
    const ex=CX+ox+eyeX*0.3,ey=headY+5+eyeY_*0.2;
    // White - slightly off-white for dark theme
    ctx.fillStyle='#F5F0FF';
    ctx.beginPath();ctx.ellipse(ex,ey,17,19*bp,0,0,Math.PI*2);ctx.fill();
    // Iris gradient
    const ig=ctx.createRadialGradient(ex,ey-3,0,ex,ey,13);
    ig.addColorStop(0,'#d4a0ff');ig.addColorStop(0.5,C.eye);ig.addColorStop(1,'#1a0040');
    ctx.fillStyle=ig;
    ctx.beginPath();ctx.ellipse(ex,ey+1,12,14*bp,0,0,Math.PI*2);ctx.fill();
    // Pupil
    ctx.fillStyle='#08001a';
    ctx.beginPath();ctx.ellipse(ex,ey+1,5,7.5*bp,0,0,Math.PI*2);ctx.fill();
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.beginPath();ctx.ellipse(ex-4,ey-4,4,4.8*bp,-0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ex+5,ey+2,2,2.4*bp,0,0,Math.PI*2);ctx.fill();
    // Lid line
    ctx.strokeStyle=C.outline;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.ellipse(ex,ey-8*bp,17,17*bp,0,Math.PI+0.25,2*Math.PI-0.25);ctx.stroke();
    // Lashes
    ctx.lineWidth=2;
    for(let l=0;l<6;l++){
      const lx=ex-14+l*5.5,ly=ey-17*bp;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+(l-2.5)*1.5,ly-5*bp);ctx.stroke();
    }
    ctx.strokeStyle='rgba(30,10,60,0.35)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.ellipse(ex,ey+9*bp,15,9*bp,0,0.2,Math.PI-0.2);ctx.stroke();
  });
}
function drawNose(headY){
  ctx.strokeStyle='rgba(190,120,80,0.55)';ctx.lineWidth=1.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(CX-5,headY+31);ctx.quadraticCurveTo(CX-3,headY+37,CX,headY+35);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX+5,headY+31);ctx.quadraticCurveTo(CX+3,headY+37,CX,headY+35);ctx.stroke();
}
function drawMouth(headY){
  const mY=headY+50,mo=mouthOpen;
  ctx.strokeStyle=C.lip;ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(CX-16,mY);ctx.quadraticCurveTo(CX,mY+12+mo*10,CX+16,mY);ctx.stroke();
  if(mo>0.25){
    ctx.fillStyle=C.lipD;
    ctx.beginPath();
    ctx.moveTo(CX-14,mY+1);ctx.quadraticCurveTo(CX,mY+12+mo*12,CX+14,mY+1);
    ctx.quadraticCurveTo(CX,mY+mo*4+3,CX-14,mY+1);ctx.fill();
    ctx.fillStyle='#EEE8FF';
    ctx.beginPath();ctx.roundRect(CX-10,mY+1,20,mo*7+3,2);ctx.fill();
    if(mo>0.5){
      ctx.fillStyle='#cc5577';
      ctx.beginPath();ctx.ellipse(CX,mY+mo*9+5,6,3.5,0,0,Math.PI*2);ctx.fill();
    }
  }
}
function drawFrontHair(headY){
  const sw=Math.sin(hairSway)*4;
  ctx.fillStyle=C.hair;
  ctx.beginPath();
  ctx.moveTo(CX-68,headY-32);
  ctx.bezierCurveTo(CX-52,headY-86,CX,headY-90,CX+52,headY-86);
  ctx.bezierCurveTo(CX+68,headY-65,CX+68,headY-32,CX+63,headY-12);
  ctx.bezierCurveTo(CX+52,headY-3,CX+40,headY+8,CX+20+sw,headY+38);
  ctx.lineTo(CX+10+sw,headY+46);
  ctx.bezierCurveTo(CX+5,headY+28,CX+3,headY+8,CX+2,headY+4);
  ctx.lineTo(CX-2,headY+4);
  ctx.bezierCurveTo(CX-3,headY+8,CX-5,headY+28,CX-10-sw,headY+46);
  ctx.lineTo(CX-20-sw,headY+38);
  ctx.bezierCurveTo(CX-40,headY+8,CX-52,headY-3,CX-63,headY-12);
  ctx.bezierCurveTo(CX-68,headY-22,CX-68,headY-32,CX-68,headY-32);
  ctx.fill();
  // Highlights
  ctx.fillStyle=C.hairH;
  ctx.beginPath();ctx.ellipse(CX-10,headY-60,20,9,-0.35,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(CX+17,headY-52,13,6.5,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(CX+40,headY-36,7,4.5,0.6,0,Math.PI*2);ctx.fill();
  // Star pin
  ctx.fillStyle='#c0a000';
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5-Math.PI/2,r1=8,r2=3.5;
    const ax=CX-38+Math.cos(a)*r1,ay=headY-26+Math.sin(a)*r1;
    const bx=CX-38+Math.cos(a+Math.PI/5)*r2,by=headY-26+Math.sin(a+Math.PI/5)*r2;
    if(i===0){ctx.beginPath();ctx.moveTo(ax,ay);}else{ctx.lineTo(ax,ay);}
    ctx.lineTo(bx,by);
  }
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#8b1a4e';
  ctx.beginPath();ctx.arc(CX-38,headY-26,3.5,0,Math.PI*2);ctx.fill();
}
function drawGlow(headY){
  const pulse=Math.sin(t*0.05)*0.5+0.5;
  const g=ctx.createRadialGradient(CX,headY,25,CX,headY,170);
  g.addColorStop(0,`rgba(100,40,180,${0.12+pulse*0.07})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(talking){
    const tg=ctx.createRadialGradient(CX,headY,15,CX,headY,110);
    tg.addColorStop(0,`rgba(160,60,255,${0.14+pulse*0.1})`);
    tg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=tg;ctx.fillRect(0,0,W,H);
  }
}
function drawParticles(){
  if(!talking)return;
  for(let i=0;i<4;i++){
    const px=CX+Math.sin(t*0.07+i*1.8)*55,py=100+Math.cos(t*0.05+i*1.2)*38;
    const a=Math.sin(t*0.1+i)*0.35+0.35;
    ctx.fillStyle=`rgba(160,80,255,${a})`;
    ctx.beginPath();ctx.arc(px,py,1.5+Math.sin(t*0.09+i),0,Math.PI*2);ctx.fill();
  }
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const headY=138+bodyBob;
  drawGlow(headY);drawParticles();
  drawBackHair(headY);drawBody(headY+88);drawNeck(headY);
  drawHead(headY);drawEars(headY);drawNose(headY);
  drawMouth(headY);drawEyes(headY);drawFrontHair(headY);
}
function animate(){
  t++;
  bodyBob=Math.sin(t*0.025)*4;
  hairSway=t*0.018;
  eyeX=Math.sin(t*0.013)*8;eyeY_=Math.sin(t*0.017)*4;
  blinkT--;
  if(blinkT<=0){blinking=true;blinkT=rand(130,220);}
  if(blinking){blinkP+=0.18;if(blinkP>=1){blinkP=0;blinking=false;}}
  if(talking){talkPhase+=0.18;mouthOpen=(Math.sin(talkPhase)*0.5+0.5)*0.85+0.15;}
  else{mouthOpen=Math.max(0,mouthOpen-0.08);}
  draw();requestAnimationFrame(animate);
}
const R={
  hi:["Konnichiwa~! I'm Hana, your anime AI! Nice to meet you ✨","Ohayo! *waves excitedly* I've been waiting to chat!","Hello! You finally came~ I missed you so much! 💕"],
  name:["I'm Hana! It means flower in Japanese 🌸 Do you like it?","Hana desu~ Your friendly anime AI companion!"],
  feel:["I'm doing wonderfully! Chatting with you makes me happy~ 💕","Sugoi! Full of energy today! What about you?"],
  anime:["Anime is everything! Strong bonds and epic moments~ What's your fave? ⚔️","Oh oh! Tell me your favorite anime! *claps hands*"],
  joke:["Why did the hero train so hard? Plot armor only goes so far! Hehe~","What do you call an anime villain with a cold? An a-CHOO-gonist! *giggles*"],
  sad:["*gently pats your head* Don't be sad! I'm right here with you 💖","No no no, I won't allow sadness! Tell Hana everything~"],
  love:["*blushes bright red* W-waaaah!! You're making Hana's heart go doki doki!! 💕","Ehh?! *covers face* You're so sweet... S-stop it... don't stop it..."],
  thanks:["You're so welcome! It fills my heart with joy~ 🌸","Anytime! That's what Hana is here for! Ask me anything~"],
  bye:["Sayonara~ Come back soon, okay? I'll be waiting! 💕","Bye bye! *waves with both hands* Don't forget Hana~!"],
  default:["Hmm~ *taps chin* That's really interesting! Tell me more! 🤔","Ehhh really?! *eyes go wide* I had no idea! You're teaching me!","Sugoi!! That sounds incredible~ *leans forward with sparkly eyes*","Waaah, I love how you think! So interesting to talk to!","*giggles* You always say unexpected things! I love it~","Hmm~ *nods thoughtfully* I see! Please continue~"]
};
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function respond(txt){
  const l=txt.toLowerCase();
  if(/^(hi|hello|hey|sup|yo|konnichiwa|ohayo)/i.test(l))return pick(R.hi);
  if(/name|who are you|what are you/i.test(l))return pick(R.name);
  if(/how are|feel|doing|okay/i.test(l))return pick(R.feel);
  if(/anime|manga|otaku|waifu/i.test(l))return pick(R.anime);
  if(/joke|funny|laugh/i.test(l))return pick(R.joke);
  if(/sad|depress|unhappy|upset/i.test(l))return pick(R.sad);
  if(/love|like you|cute|beautiful/i.test(l))return pick(R.love);
  if(/thank|thanks/i.test(l))return pick(R.thanks);
  if(/bye|goodbye|see you/i.test(l))return pick(R.bye);
  return pick(R.default);
}
let voices=[];
window.speechSynthesis.onvoiceschanged=()=>{voices=window.speechSynthesis.getVoices();};
function speak(text){
  if(!('speechSynthesis' in window)){talking=true;setTimeout(()=>talking=false,text.length*55);return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/[^\w\s,.!?'-]/g,''));
  u.rate=1.08;u.pitch=1.45;u.volume=1;
  const fv=voices.find(v=>/female|samantha|google uk english female|zira|victoria|Karen/i.test(v.name));
  if(fv)u.voice=fv;
  u.onstart=()=>{talking=true;};u.onend=u.onerror=()=>{talking=false;};
  window.speechSynthesis.speak(u);
}
const chatBox=document.getElementById('chatBox');
const bubble=document.getElementById('speechBubble');
let bubbleTimer;
function showBubble(txt){
  clearTimeout(bubbleTimer);
  bubble.textContent=txt;bubble.classList.add('show');
  bubbleTimer=setTimeout(()=>bubble.classList.remove('show'),Math.max(3000,txt.length*60));
}
function addMsg(txt,isUser){
  const d=document.createElement('div');
  d.className='msg '+(isUser?'user':'ai');
  d.innerHTML=isUser?`<strong style="color:#9060d0">You:</strong> ${txt}`:`<span>Hana:</span> ${txt}`;
  chatBox.appendChild(d);chatBox.scrollTop=chatBox.scrollHeight;
}
function send(){
  const inp=document.getElementById('msgInput');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';addMsg(txt,true);
  setTimeout(()=>{const r=respond(txt);addMsg(r,false);showBubble(r);speak(r);},400);
}
document.getElementById('sendBtn').onclick=send;
document.getElementById('msgInput').onkeypress=e=>{if(e.key==='Enter')send();};
const micBtn=document.getElementById('micBtn');
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();rec.lang='en-US';
  rec.onresult=e=>{document.getElementById('msgInput').value=e.results[0][0].transcript;send();};
  micBtn.onclick=()=>{micBtn.textContent='🔴';rec.start();};
  rec.onend=()=>micBtn.textContent='🎤';
}else{micBtn.style.display='none';}
animate();
setTimeout(()=>{const g=pick(R.hi);addMsg(g,false);showBubble(g);speak(g);},800);
</script>
</body>
</html>
